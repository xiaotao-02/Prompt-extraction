name: Auto Release

# 每次 push 到 main 分支：
#   1. 自动 bump package.json 版本号（默认 patch；commit 含 [minor]/[major] 时升相应位）
#   2. npm run build && npm run zip
#   3. 提交 bump commit 并打 tag
#   4. 用打好的 zip 自动创建 GitHub Release
#
# 用户的扩展默认更新源指向本仓库（src/lib/updater.ts 中的 DEFAULT_FEED_URL），
# Release 一旦发布，所有用户在下次定时检查（默认 24 小时）或手动检查时都会收到更新。
#
# 触发跳过：commit message 包含 [skip release] 或 chore(release): 时不发版。
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.head_commit.message, '[skip release]') &&
      !contains(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Decide version bump level
        id: level
        run: |
          MSG="${{ github.event.head_commit.message }}"
          LEVEL=patch
          if echo "$MSG" | grep -qE '\[major\]|BREAKING CHANGE'; then
            LEVEL=major
          elif echo "$MSG" | grep -qE '\[minor\]'; then
            LEVEL=minor
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "Selected bump level: $LEVEL"

      - name: Bump version
        id: bump
        run: |
          NEW_TAG=$(npm version ${{ steps.level.outputs.level }} --no-git-tag-version)
          NEW_VERSION=${NEW_TAG#v}
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_TAG"

      - name: Build & zip
        run: npm run zip

      - name: List dist-zip
        run: ls -la dist-zip

      - name: Commit & push bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin HEAD:main
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-zip/*.zip
